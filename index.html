<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fruit Ninja Web Audio Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background-color: #0f0f1a;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .game-container {
      position: relative;
      width: 800px;
      height: 500px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid #2a2a40;
    }

    canvas {
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, #1e1e30, #0f0f1a);
      cursor: crosshair;
      display: block;
    }

    .ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.5rem;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    .score { color: #00f2fe; }
    .lives { color: #ff4757; }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 15, 26, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
      pointer-events: auto;
    }

    .overlay h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      background: linear-gradient(45deg, #ff4757, #ffa502);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .overlay p {
      font-size: 1.1rem;
      color: #a0a0c0;
      margin-bottom: 25px;
      text-align: center;
    }

    .btn {
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: #fff;
      border: none;
      padding: 14px 32px;
      font-size: 1.2rem;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 12px 25px rgba(108, 92, 231, 0.6);
    }

    .btn:active {
      transform: translateY(0) scale(1);
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="game-container">
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <div class="ui-layer">
      <div class="hud">
        <div class="score">SCORE: <span id="scoreVal">0</span></div>
        <div class="lives">LIVES: <span id="livesVal">❤️❤️❤️</span></div>
      </div>
    </div>

    <div id="overlay" class="overlay">
      <h1 id="overlayTitle">FRUIT SLICE</h1>
      <p id="overlaySub">Slice fruits, avoid bombs, turn up your volume!</p>
      <button id="startBtn" class="btn">START GAME</button>
    </div>
  </div>

  <script>
    // ==========================================
    // AUDIO ENGINE (Web Audio API Synthesizer)
    // ==========================================
    class AudioManager {
      constructor() {
        this.ctx = null;
        this.isPlayingMusic = false;
        this.musicTimer = null;
      }

      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      }

      // --- 1. HARMONIZED BACKGROUND SOUNDTRACK ---
      startMusic() {
        this.init();
        if (this.isPlayingMusic) return;
        this.isPlayingMusic = true;

        // Dynamic scale progression (C Minor / Harmonic Pentatonic)
        const scale = [130.81, 155.56, 174.61, 196.00, 233.08];
        let step = 0;

        const playStep = () => {
          if (!this.isPlayingMusic) return;

          const now = this.ctx.currentTime;

          // Bass layer
          const bassOsc = this.ctx.createOscillator();
          const bassGain = this.ctx.createGain();
          const filter = this.ctx.createBiquadFilter();

          bassOsc.type = 'sawtooth';
          bassOsc.frequency.setValueAtTime(65.41, now); // Low C

          filter.type = 'lowpass';
          filter.frequency.setValueAtTime(300, now);

          bassGain.gain.setValueAtTime(0.12, now);
          bassGain.gain.exponentialRampToValueAtTime(0.001, now + 0.38);

          bassOsc.connect(filter);
          filter.connect(bassGain);
          bassGain.connect(this.ctx.destination);

          bassOsc.start(now);
          bassOsc.stop(now + 0.4);

          // Lead synth melody
          const leadOsc = this.ctx.createOscillator();
          const leadGain = this.ctx.createGain();

          leadOsc.type = 'triangle';
          const note = scale[step % scale.length];
          leadOsc.frequency.setValueAtTime(note, now);

          leadGain.gain.setValueAtTime(0.08, now);
          leadGain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);

          leadOsc.connect(leadGain);
          leadGain.connect(this.ctx.destination);

          leadOsc.start(now);
          leadOsc.stop(now + 0.25);

          step++;
          this.musicTimer = setTimeout(playStep, 200);
        };

        playStep();
      }

      stopMusic() {
        this.isPlayingMusic = false;
        if (this.musicTimer) {
          clearTimeout(this.musicTimer);
          this.musicTimer = null;
        }
      }

      // --- 2. FRUIT SLICE SWOOSH ---
      playSliceSound() {
        this.init();
        const now = this.ctx.currentTime;

        const bufferSize = this.ctx.sampleRate * 0.15;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const output = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          output[i] = Math.random() * 2 - 1;
        }

        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;

        const filter = this.ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.setValueAtTime(800, now);
        filter.frequency.exponentialRampToValueAtTime(3200, now + 0.12);

        const gain = this.ctx.createGain();
        gain.gain.setValueAtTime(0.35, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);

        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.ctx.destination);

        noise.start(now);
      }

      // --- 3. BOMB DETONATION BOOM ---
      playBoomSound() {
        this.init();
        const now = this.ctx.currentTime;

        // Sub-bass pitch drop
        const osc = this.ctx.createOscillator();
        const oscGain = this.ctx.createGain();

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(160, now);
        osc.frequency.exponentialRampToValueAtTime(25, now + 0.5);

        oscGain.gain.setValueAtTime(0.7, now);
        oscGain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);

        osc.connect(oscGain);
        oscGain.connect(this.ctx.destination);

        osc.start(now);
        osc.stop(now + 0.5);

        // Low noise explosion rumble
        const bufferSize = this.ctx.sampleRate * 0.6;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const output = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
          output[i] = Math.random() * 2 - 1;
        }

        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;

        const noiseFilter = this.ctx.createBiquadFilter();
        noiseFilter.type = 'lowpass';
        noiseFilter.frequency.setValueAtTime(450, now);
        noiseFilter.frequency.linearRampToValueAtTime(40, now + 0.6);

        const noiseGain = this.ctx.createGain();
        noiseGain.gain.setValueAtTime(0.5, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);

        noise.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(this.ctx.destination);

        noise.start(now);
      }
    }

    // Initialize Audio Manager
    const audio = new AudioManager();

    // ==========================================
    // GAME ENGINE & MECHANICS
    // ==========================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlaySub = document.getElementById('overlaySub');
    const startBtn = document.getElementById('startBtn');
    const scoreVal = document.getElementById('scoreVal');
    const livesVal = document.getElementById('livesVal');

    let gameActive = false;
    let score = 0;
    let lives = 3;
    let items = [];
    let particles = [];
    let mouseTrail = [];
    let isMouseDown = false;
    let spawnTimer = null;

    const FRUIT_TYPES = [
      { name: 'Watermelon', color: '#2ed573', radius: 30, emoji: '🍉' },
      { name: 'Apple', color: '#ff4757', radius: 25, emoji: '🍎' },
      { name: 'Orange', color: '#ffa502', radius: 25, emoji: '🍊' },
      { name: 'Banana', color: '#eccc68', radius: 22, emoji: '🍌' }
    ];

    class GameItem {
      constructor() {
        this.isBomb = Math.random() < 0.25; // 25% chance to spawn a bomb
        if (this.isBomb) {
          this.color = '#2f3542';
          this.radius = 26;
          this.emoji = '💣';
        } else {
          const type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
          this.color = type.color;
          this.radius = type.radius;
          this.emoji = type.emoji;
        }

        this.x = Math.random() * (canvas.width - 100) + 50;
        this.y = canvas.height + this.radius;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = -(Math.random() * 3 + 11); // Initial vertical impulse
        this.gravity = 0.22;
        this.sliced = false;
        this.rotation = Math.random() * Math.PI * 2;
        this.vRot = (Math.random() - 0.5) * 0.1;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += this.gravity;
        this.rotation += this.vRot;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.font = `${this.radius * 1.6}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.emoji, 0, 0);
        ctx.restore();
      }
    }

    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.radius = Math.random() * 4 + 2;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.alpha = 1;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 0.03;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // --- Slice Collision Detection ---
    function checkSlices() {
      if (mouseTrail.length < 2) return;
      const p1 = mouseTrail[mouseTrail.length - 2];
      const p2 = mouseTrail[mouseTrail.length - 1];

      for (let item of items) {
        if (item.sliced) continue;

        // Distance check to segment
        const dist = distToSegment(item, p1, p2);
        if (dist < item.radius) {
          item.sliced = true;

          if (item.isBomb) {
            audio.playBoomSound();
            createExplosion(item.x, item.y, '#ff4757');
            loseLife();
          } else {
            audio.playSliceSound();
            createExplosion(item.x, item.y, item.color);
            score += 10;
            scoreVal.textContent = score;
          }
        }
      }
    }

    function distToSegment(p, v, w) {
      const l2 = (w.x - v.x) ** 2 + (w.y - v.y) ** 2;
      if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
      let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
      t = Math.max(0, Math.min(1, t));
      return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
    }

    function createExplosion(x, y, color) {
      for (let i = 0; i < 16; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    function loseLife() {
      lives--;
      livesVal.textContent = '❤️'.repeat(Math.max(0, lives));
      if (lives <= 0) {
        gameOver();
      }
    }

    function startGame() {
      score = 0;
      lives = 3;
      items = [];
      particles = [];
      scoreVal.textContent = score;
      livesVal.textContent = '❤️❤️❤️';
      gameActive = true;
      overlay.classList.add('hidden');

      audio.startMusic();

      if (spawnTimer) clearInterval(spawnTimer);
      spawnTimer = setInterval(() => {
        if (gameActive) {
          items.push(new GameItem());
        }
      }, 1000);
    }

    function gameOver() {
      gameActive = false;
      audio.stopMusic();
      if (spawnTimer) clearInterval(spawnTimer);

      overlayTitle.textContent = "GAME OVER";
      overlaySub.textContent = `Your Final Score: ${score}`;
      startBtn.textContent = "PLAY AGAIN";
      overlay.classList.remove('hidden');
    }

    // --- Input Event Handlers ---
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX || e.touches[0].clientX) - rect.left,
        y: (e.clientY || e.touches[0].clientY) - rect.top
      };
    }

    const handleStart = (e) => {
      isMouseDown = true;
      mouseTrail = [getPos(e)];
    };

    const handleMove = (e) => {
      if (!isMouseDown) return;
      mouseTrail.push(getPos(e));
      if (mouseTrail.length > 8) mouseTrail.shift();
      checkSlices();
    };

    const handleEnd = () => {
      isMouseDown = false;
      mouseTrail = [];
    };

    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);

    canvas.addEventListener('touchstart', (e) => { handleStart(e); e.preventDefault(); });
    canvas.addEventListener('touchmove', (e) => { handleMove(e); e.preventDefault(); });
    window.addEventListener('touchend', handleEnd);

    startBtn.addEventListener('click', startGame);

    // --- Main Game Loop ---
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (gameActive) {
        // Update & draw items
        for (let i = items.length - 1; i >= 0; i--) {
          const item = items[i];
          item.update();
          item.draw();

          // Check if item fell off bottom without slice
          if (item.y > canvas.height + 50) {
            if (!item.sliced && !item.isBomb) {
              loseLife();
            }
            items.splice(i, 1);
          } else if (item.sliced) {
            items.splice(i, 1);
          }
        }

        // Update & draw particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.update();
          p.draw();
          if (p.alpha <= 0) particles.splice(i, 1);
        }

        // Draw blade trail
        if (mouseTrail.length > 1) {
          ctx.beginPath();
          ctx.moveTo(mouseTrail[0].x, mouseTrail[0].y);
          for (let i = 1; i < mouseTrail.length; i++) {
            ctx.lineTo(mouseTrail[i].x, mouseTrail[i].y);
          }
          ctx.strokeStyle = '#00f2fe';
          ctx.lineWidth = 5;
          ctx.lineCap = 'round';
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#00f2fe';
          ctx.stroke();
          ctx.shadowBlur = 0; // reset shadow
        }
      }

      requestAnimationFrame(render);
    }

    render();
  </script>
</body>
</html>
