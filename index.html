<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Ninja - HTML5 Canvas</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background: #0f0c20;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border-radius: 16px;
            overflow: hidden;
            background: 
                radial-gradient(ellipse at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%),
                repeating-linear-gradient(
                    0deg,
                    #523112,
                    #523112 40px,
                    #42260c 40px,
                    #42260c 80px,
                    #613b16 80px,
                    #613b16 120px
                );
            border: 10px solid #2e1806;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        #game-container.frozen {
            border-color: #00d2d3;
            box-shadow: 0 0 35px rgba(0, 210, 211, 0.8);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-size: 26px;
            font-weight: bold;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
        }
        .score-board {
            color: #f1c40f;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(241, 196, 15, 0.3);
        }
        .lives-board {
            color: #e74c3c;
            letter-spacing: 3px;
            font-size: 22px;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }
        .combo-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.85), rgba(40, 20, 0, 0.85));
            border: 2px solid #f39c12;
            border-radius: 30px;
            padding: 8px 28px;
            font-size: 28px;
            font-weight: 900;
            color: #ffb703;
            text-shadow: 0 0 12px rgba(243, 156, 18, 0.9), 2px 2px 0px #000;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
            letter-spacing: 2px;
            transition: all 0.15s ease-out;
            opacity: 0;
            transform: translateX(-50%) scale(0.8);
        }
        .combo-box.active {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            animation: pulseCombo 0.25s ease-out forwards;
        }
        @keyframes pulseCombo {
            0% { transform: translateX(-50%) scale(1.3); }
            100% { transform: translateX(-50%) scale(1); }
        }
        .freeze-indicator {
            position: absolute;
            top: 78px;
            left: 50%;
            transform: translateX(-50%);
            color: #00f2fe;
            font-size: 22px;
            font-weight: 900;
            text-shadow: 0 0 12px rgba(0, 242, 254, 0.9), 2px 2px 4px #000;
            letter-spacing: 2px;
            display: none;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 8, 20, 0.82);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            backdrop-filter: blur(6px);
        }
        .title {
            font-size: 58px;
            font-weight: 900;
            color: #ff4757;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 5px 15px rgba(255, 71, 87, 0.6), 3px 3px 0px #000;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 18px;
            color: #dfe4ea;
            margin-bottom: 30px;
            text-align: center;
            max-width: 80%;
            line-height: 1.5;
        }
        .btn {
            padding: 16px 44px;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #2ed573, #1e90ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(46, 213, 115, 0.5);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 30px rgba(46, 213, 115, 0.7);
        }
        .btn:active {
            transform: translateY(1px) scale(0.98);
        }
        .hidden {
            display: none !important;
        }
        .game-over-score {
            font-size: 30px;
            color: #ffb703;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div class="ui-layer">
        <div class="hud">
            <div class="score-board">🍉 <span id="scoreText">0</span></div>
            <div class="lives-board" id="livesText">❌ ❌ ❌ ❌ ❌</div>
        </div>
        <div id="comboBox" class="combo-box">COMBO x2</div>
        <div id="freezeIndicator" class="freeze-indicator">❄️ FROZEN! ❄️</div>
    </div>

    <!-- Start Menu Overlay -->
    <div id="startOverlay" class="overlay">
        <h1 class="title">Fruit Ninja</h1>
        <p class="subtitle">Slice fruits with your mouse or finger! Chain quick slices for 2x Combo points and hit Ice Bananas to freeze time!</p>
        <button class="btn" onclick="startGame()">Play Game</button>
    </div>

    <!-- Game Over Overlay -->
    <div id="gameOverOverlay" class="overlay hidden">
        <h1 class="title" style="color: #ff4757;">Game Over</h1>
        <div class="game-over-score">Final Score: <span id="finalScore">0</span></div>
        <button class="btn" onclick="startGame()">Try Again</button>
    </div>
</div>

<script>
    const gameContainer = document.getElementById('game-container');
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // UI elements
    const scoreText = document.getElementById('scoreText');
    const livesText = document.getElementById('livesText');
    const comboBox = document.getElementById('comboBox');
    const freezeIndicator = document.getElementById('freezeIndicator');
    const startOverlay = document.getElementById('startOverlay');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const finalScore = document.getElementById('finalScore');

    // Game state
    let gameActive = false;
    let score = 0;
    let lives = 5;
    let spawnInterval = 130;
    let frameCount = 0;

    // Freeze Effect State
    const TOTAL_FREEZE_TIME = 5000;
    let freezeTimer = 0;

    // Combo System State
    let recentSliceTimes = [];
    let isComboActive = false;
    let comboCount = 0;
    let lastSliceTimestamp = 0;
    const COMBO_TIMEOUT = 1250; // 1.25 seconds timeout
    const COMBO_TRIGGER_WINDOW = 2000; // 2 seconds window

    // Slicer Blade Trail
    let bladeTrail = [];
    let isMouseDown = false;

    // Rich Fruit definitions
    const FRUIT_TYPES = [
        { name: 'watermelon', radius: 36, score: 10, innerColor: '#ff3f34' },
        { name: 'orange', radius: 28, score: 10, innerColor: '#ff9f1a' },
        { name: 'apple', radius: 26, score: 10, innerColor: '#fff200' },
        { name: 'lemon', radius: 25, score: 15, innerColor: '#fff200' },
        { name: 'coconut', radius: 30, score: 15, innerColor: '#f5f5f5' },
        { name: 'strawberry', radius: 24, score: 15, innerColor: '#ff4d4d' },
        { name: 'kiwi', radius: 25, score: 15, innerColor: '#32ff7e' },
        { name: 'pineapple', radius: 36, score: 20, innerColor: '#ffaf40' },
        { name: 'dragonfruit', radius: 32, score: 20, innerColor: '#ffffff' },
        { name: 'banana', radius: 30, score: 15, innerColor: '#fff200' }
    ];

    const ICE_BANANA_TYPE = { name: 'ice_banana', radius: 30, score: 25, innerColor: '#00d2d3', isSpecial: true };

    let items = [];
    let particles = [];
    let splatters = [];

    const SPEED_MULT = 0.15;

    function drawWoodTexture() {
        ctx.fillStyle = '#4a2b10';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const plankHeight = 80;
        for (let y = 0; y < canvas.height; y += plankHeight) {
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.fillRect(0, y, canvas.width, 3);

            ctx.strokeStyle = 'rgba(30, 15, 5, 0.15)';
            ctx.lineWidth = 2;
            for (let i = 8; i < plankHeight; i += 14) {
                ctx.beginPath();
                ctx.moveTo(0, y + i);
                ctx.bezierCurveTo(canvas.width * 0.35, y + i + 5, canvas.width * 0.65, y + i - 5, canvas.width, y + i);
                ctx.stroke();
            }
        }

        ctx.strokeStyle = 'rgba(20, 10, 0, 0.5)';
        ctx.lineWidth = 14;
        ctx.strokeRect(15, 15, canvas.width - 30, canvas.height - 30);
    }

    // --- High Realism Fruit Vector Shapes & Renderers --- //

    function drawBananaPath(ctx, r) {
        ctx.beginPath();
        ctx.moveTo(-r * 1.2, -r * 0.3);
        ctx.bezierCurveTo(-r * 0.6, -r * 1.1, r * 0.6, -r * 1.0, r * 1.3, -r * 0.1);
        ctx.bezierCurveTo(r * 1.45, 0.1, r * 1.35, r * 0.3, r * 1.15, r * 0.35);
        ctx.bezierCurveTo(r * 0.5, r * 0.5, -r * 0.5, r * 0.6, -r * 1.0, 0);
        ctx.closePath();
    }

    function drawDragonfruitPath(ctx, r) {
        ctx.beginPath();
        ctx.moveTo(0, -r * 1.25);
        ctx.bezierCurveTo(-r * 1.15, -r * 0.8, -r * 0.95, r * 0.7, 0, r * 1.15);
        ctx.bezierCurveTo(r * 0.95, r * 0.7, r * 1.15, -r * 0.8, 0, -r * 1.25);
        ctx.closePath();
    }

    function drawApplePath(ctx, r) {
        ctx.beginPath();
        ctx.moveTo(0, -r * 0.65);
        ctx.bezierCurveTo(-r * 0.65, -r * 1.15, -r * 1.2, -r * 0.2, -r * 0.9, r * 0.55);
        ctx.bezierCurveTo(-r * 0.65, r * 1.1, -r * 0.2, r * 0.85, 0, r * 0.7);
        ctx.bezierCurveTo(r * 0.2, r * 0.85, r * 0.65, r * 1.1, r * 0.9, r * 0.55);
        ctx.bezierCurveTo(r * 1.2, -r * 0.2, r * 0.65, -r * 1.15, 0, -r * 0.65);
        ctx.closePath();
    }

    function drawLemonPath(ctx, r) {
        ctx.beginPath();
        ctx.moveTo(-r * 1.28, 0);
        ctx.bezierCurveTo(-r * 0.95, -r * 0.88, r * 0.95, -r * 0.88, r * 1.28, 0);
        ctx.bezierCurveTo(r * 0.95, r * 0.88, -r * 0.95, r * 0.88, -r * 1.28, 0);
        ctx.closePath();
    }

    function drawStrawberryPath(ctx, r) {
        ctx.beginPath();
        ctx.moveTo(0, r * 1.15);
        ctx.bezierCurveTo(-r * 1.15, 0.1, -r * 0.9, -r * 0.85, 0, -r * 0.6);
        ctx.bezierCurveTo(r * 0.9, -r * 0.85, r * 1.15, 0.1, 0, r * 1.15);
        ctx.closePath();
    }

    function renderRealisticFruit(ctx, type, r) {
        if (type.name === 'watermelon') {
            const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
            grad.addColorStop(0, '#2ed573');
            grad.addColorStop(0.7, '#10ac84');
            grad.addColorStop(1, '#018a5e');

            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Dark wavy stripes
            ctx.save();
            ctx.clip();
            ctx.fillStyle = '#0a3d28';
            for (let a = 0; a < Math.PI * 2; a += Math.PI / 3) {
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(Math.cos(a - 0.2) * r * 1.2, Math.sin(a - 0.2) * r * 1.2);
                ctx.quadraticCurveTo(Math.cos(a) * r * 0.6, Math.sin(a) * r * 0.6, Math.cos(a + 0.2) * r * 1.2, Math.sin(a + 0.2) * r * 1.2);
                ctx.closePath();
                ctx.fill();
            }
            ctx.restore();

            // Highlight shine
            ctx.beginPath();
            ctx.arc(-r * 0.35, -r * 0.35, r * 0.22, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fill();

        } else if (type.name === 'dragonfruit') {
            drawDragonfruitPath(ctx, r);
            const grad = ctx.createRadialGradient(-r * 0.2, -r * 0.3, r * 0.1, 0, 0, r * 1.2);
            grad.addColorStop(0, '#ff4757');
            grad.addColorStop(0.6, '#e84393');
            grad.addColorStop(1, '#8e44ad');
            ctx.fillStyle = grad;
            ctx.fill();

            // Leafy scales
            ctx.fillStyle = '#2ed573';
            ctx.strokeStyle = '#20bf6b';
            ctx.lineWidth = 1.5;
            const scales = [
                {x: 0, y: -r * 1.25, rot: 0, s: 1.2},
                {x: -r * 0.8, y: -r * 0.5, rot: -0.6, s: 1},
                {x: r * 0.8, y: -r * 0.5, rot: 0.6, s: 1},
                {x: -r * 0.85, y: r * 0.2, rot: -1.2, s: 1},
                {x: r * 0.85, y: r * 0.2, rot: 1.2, s: 1},
                {x: 0, y: r * 1.1, rot: Math.PI, s: 1.1}
            ];
            scales.forEach(sc => {
                ctx.save();
                ctx.translate(sc.x, sc.y);
                ctx.rotate(sc.rot);
                ctx.scale(sc.s, sc.s);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.quadraticCurveTo(-7, -12, 0, -20);
                ctx.quadraticCurveTo(7, -12, 0, 0);
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            });

        } else if (type.name === 'apple') {
            drawApplePath(ctx, r);
            const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
            grad.addColorStop(0, '#ff6b6b');
            grad.addColorStop(0.5, '#ee5253');
            grad.addColorStop(1, '#b01d21');
            ctx.fillStyle = grad;
            ctx.fill();

            // Stem & leaf
            ctx.fillStyle = '#5d4037';
            ctx.fillRect(-2, -r * 0.9, 4, 8);
            ctx.fillStyle = '#2ed573';
            ctx.beginPath();
            ctx.ellipse(5, -r * 0.8, 7, 3.5, Math.PI / 4, 0, Math.PI * 2);
            ctx.fill();

            // Highlight
            ctx.beginPath();
            ctx.arc(-r * 0.35, -r * 0.35, r * 0.2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fill();

        } else if (type.name === 'orange') {
            const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
            grad.addColorStop(0, '#ffa801');
            grad.addColorStop(0.7, '#ff7f50');
            grad.addColorStop(1, '#d35400');
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Pores texture
            ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
            for (let i = 0; i < 16; i++) {
                const px = (Math.random() - 0.5) * r * 1.5;
                const py = (Math.random() - 0.5) * r * 1.5;
                if (px * px + py * py < r * r * 0.7) {
                    ctx.fillRect(px, py, 1.5, 1.5);
                }
            }

            // Stem navel
            ctx.fillStyle = '#27ae60';
            ctx.beginPath();
            ctx.arc(0, -r * 0.85, 3, 0, Math.PI * 2);
            ctx.fill();

        } else if (type.name === 'lemon') {
            drawLemonPath(ctx, r);
            const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r * 1.2);
            grad.addColorStop(0, '#fffa65');
            grad.addColorStop(0.7, '#fff200');
            grad.addColorStop(1, '#e5a823');
            ctx.fillStyle = grad;
            ctx.fill();

            // Green tip
            ctx.fillStyle = '#2ed573';
            ctx.beginPath();
            ctx.arc(-r * 1.25, 0, 3, 0, Math.PI * 2);
            ctx.fill();

        } else if (type.name === 'strawberry') {
            drawStrawberryPath(ctx, r);
            const grad = ctx.createRadialGradient(-r * 0.2, -r * 0.3, r * 0.1, 0, 0, r * 1.2);
            grad.addColorStop(0, '#ff4d4d');
            grad.addColorStop(0.7, '#ff3838');
            grad.addColorStop(1, '#9e0e0e');
            ctx.fillStyle = grad;
            ctx.fill();

            // Yellow seeds
            ctx.fillStyle = '#fffa65';
            for (let sx = -r * 0.5; sx <= r * 0.5; sx += 8) {
                for (let sy = -r * 0.3; sy <= r * 0.8; sy += 9) {
                    ctx.beginPath();
                    ctx.arc(sx + (sy % 3), sy, 1.2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Green cap
            ctx.fillStyle = '#2ed573';
            ctx.beginPath();
            ctx.arc(0, -r * 0.55, 7, 0, Math.PI * 2);
            ctx.fill();

        } else if (type.name === 'pineapple') {
            ctx.beginPath();
            ctx.ellipse(0, 0, r * 0.82, r, 0, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(-r * 0.2, -r * 0.3, r * 0.1, 0, 0, r);
            grad.addColorStop(0, '#ffaf40');
            grad.addColorStop(0.7, '#e67e22');
            grad.addColorStop(1, '#7e5109');
            ctx.fillStyle = grad;
            ctx.fill();

            // Diamond pattern
            ctx.save();
            ctx.clip();
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.35)';
            ctx.lineWidth = 2;
            for (let i = -r * 2; i < r * 2; i += 11) {
                ctx.beginPath();
                ctx.moveTo(i, -r); ctx.lineTo(i + r * 1.2, r);
                ctx.moveTo(i, -r); ctx.lineTo(i - r * 1.2, r);
                ctx.stroke();
            }
            ctx.restore();

            // Crown leaves
            ctx.fillStyle = '#2ed573';
            ctx.beginPath();
            ctx.moveTo(-r * 0.4, -r * 0.8); ctx.lineTo(-r * 0.9, -r * 1.6); ctx.lineTo(0, -r * 0.95);
            ctx.lineTo(r * 0.9, -r * 1.6); ctx.lineTo(r * 0.4, -r * 0.8);
            ctx.fill();

        } else if (type.name === 'coconut') {
            const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
            grad.addColorStop(0, '#8d6e63');
            grad.addColorStop(0.7, '#5d4037');
            grad.addColorStop(1, '#3e2723');
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Three eyes
            ctx.fillStyle = '#21120b';
            ctx.beginPath();
            ctx.arc(-6, -6, 3.5, 0, Math.PI * 2);
            ctx.arc(6, -8, 3, 0, Math.PI * 2);
            ctx.arc(0, 3, 3.5, 0, Math.PI * 2);
            ctx.fill();

        } else if (type.name === 'kiwi') {
            const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
            grad.addColorStop(0, '#a5804f');
            grad.addColorStop(0.7, '#7d5a29');
            grad.addColorStop(1, '#4e3410');
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();

            // Fuzzy texture
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.lineWidth = 1;
            for (let a = 0; a < Math.PI * 2; a += 0.4) {
                ctx.beginPath();
                ctx.moveTo(Math.cos(a) * r * 0.9, Math.sin(a) * r * 0.9);
                ctx.lineTo(Math.cos(a) * r * 1.05, Math.sin(a) * r * 1.05);
                ctx.stroke();
            }

        } else if (type.name === 'banana' || type.name === 'ice_banana') {
            drawBananaPath(ctx, r);
            if (type.name === 'ice_banana') {
                ctx.save();
                ctx.clip();
                
                ctx.fillStyle = '#fff200';
                ctx.fillRect(-r * 2, -r * 2, r * 4, r * 4);

                // Cyan ice stripes
                ctx.fillStyle = '#00d2d3';
                for (let i = -r * 2; i < r * 2; i += 12) {
                    ctx.fillRect(i, -r * 2, 6, r * 4);
                }

                ctx.restore();
                ctx.strokeStyle = '#00f2fe';
                ctx.lineWidth = 2.5;
                ctx.stroke();
            } else {
                const grad = ctx.createLinearGradient(0, -r, 0, r);
                grad.addColorStop(0, '#fff200');
                grad.addColorStop(0.7, '#fffa65');
                grad.addColorStop(1, '#f5cd79');
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = '#e5a823';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            // Dark tip and stem
            ctx.fillStyle = '#4b382a';
            ctx.beginPath(); ctx.arc(-r * 1.15, -r * 0.28, 3.5, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(r * 1.25, 0, 3, 0, Math.PI * 2); ctx.fill();
        }
    }

    class Item {
        constructor() {
            const rand = Math.random();
            this.isBomb = rand < 0.18;
            this.isIceBanana = !this.isBomb && rand > 0.85;

            if (this.isBomb) {
                this.radius = 25;
                this.color = '#333';
            } else if (this.isIceBanana) {
                this.type = ICE_BANANA_TYPE;
                this.radius = this.type.radius;
                this.color = '#00d2d3';
            } else {
                this.type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
                this.radius = this.type.radius;
                this.color = this.type.innerColor;
            }

            this.x = Math.random() * (canvas.width - 160) + 80;
            this.y = canvas.height + this.radius;

            const targetX = canvas.width / 2 + (Math.random() * 200 - 100);
            const targetY = Math.random() * 150 + 100;
            
            const timeToPeak = (45 + Math.random() * 15) / SPEED_MULT;
            this.vx = ((targetX - this.x) / (timeToPeak * 2)) * SPEED_MULT;
            
            this.gravity = 0.35 * SPEED_MULT;
            this.vy = -Math.sqrt(2 * this.gravity * (canvas.height - targetY));

            this.rotation = (Math.random() - 0.5) * Math.PI;
            this.vRot = ((Math.random() - 0.5) * 0.1) * SPEED_MULT;
            this.sliced = false;
        }

        update() {
            if (freezeTimer > 0) return;

            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            this.rotation += this.vRot;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);

            if (this.isBomb) {
                const bgGrad = ctx.createRadialGradient(-this.radius * 0.3, -this.radius * 0.3, 2, 0, 0, this.radius);
                bgGrad.addColorStop(0, '#666');
                bgGrad.addColorStop(0.5, '#222');
                bgGrad.addColorStop(1, '#050505');

                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = bgGrad;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#444';
                ctx.stroke();

                ctx.fillStyle = '#888';
                ctx.fillRect(-4, -this.radius - 2, 8, 4);

                ctx.beginPath();
                ctx.moveTo(0, -this.radius - 2);
                ctx.quadraticCurveTo(10, -this.radius - 12, 5, -this.radius - 18);
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#a67c52';
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(5, -this.radius - 18, 6 + Math.random() * 2, 0, Math.PI * 2);
                ctx.fillStyle = Math.random() > 0.5 ? '#ff9f1a' : '#ff3f34';
                ctx.fill();

                ctx.beginPath();
                ctx.arc(5, -this.radius - 18, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
            } else {
                renderRealisticFruit(ctx, this.type, this.radius);
            }

            ctx.restore();
        }
    }

    class HalfFruit {
        constructor(x, y, type, isLeft, vx) {
            this.x = x;
            this.y = y;
            this.type = type;
            this.isLeft = isLeft;
            this.radius = type.radius;
            this.isHalf = true;
            
            this.vx = (vx + (isLeft ? -2.5 : 2.5) + (Math.random() - 0.5)) * 0.5;
            this.vy = (-2 - Math.random() * 2) * SPEED_MULT;
            this.gravity = 0.35 * SPEED_MULT;
            this.rotation = Math.random() * Math.PI;
            this.vRot = ((isLeft ? -0.15 : 0.15) + (Math.random() - 0.5) * 0.05) * SPEED_MULT;
        }

        update() {
            if (freezeTimer > 0) return;

            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            this.rotation += this.vRot;
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);

            const r = this.radius;

            if (this.type.name === 'ice_banana' || this.type.name === 'banana') {
                drawBananaPath(ctx, r * 0.85);
                ctx.save();
                ctx.clip();
                ctx.fillStyle = this.type.name === 'ice_banana' ? '#00d2d3' : '#fff200';
                ctx.fillRect(-r * 2, -r * 2, r * 4, r * 4);
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(0, 0, r * 0.45, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            } else {
                ctx.beginPath();
                ctx.arc(0, 0, r, this.isLeft ? Math.PI / 2 : -Math.PI / 2, this.isLeft ? -Math.PI / 2 : Math.PI / 2);
                ctx.closePath();
                ctx.fillStyle = '#222';
                ctx.fill();

                ctx.beginPath();
                ctx.arc(0, 0, r * 0.85, this.isLeft ? Math.PI / 2 : -Math.PI / 2, this.isLeft ? -Math.PI / 2 : Math.PI / 2);
                ctx.closePath();
                ctx.fillStyle = this.type.innerColor;
                ctx.fill();

                // Seeds on cut interior
                if (['watermelon', 'apple', 'kiwi', 'dragonfruit'].includes(this.type.name)) {
                    ctx.fillStyle = '#111';
                    const sideMult = this.isLeft ? -1 : 1;
                    ctx.beginPath();
                    ctx.arc(sideMult * r * 0.3, -r * 0.2, 2, 0, Math.PI * 2);
                    ctx.arc(sideMult * r * 0.4, r * 0.2, 2, 0, Math.PI * 2);
                    ctx.arc(sideMult * r * 0.2, r * 0.4, 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.restore();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.radius = Math.random() * 4 + 2;
            this.vx = (Math.random() - 0.5) * 8;
            this.vy = (Math.random() - 0.5) * 8;
            this.gravity = 0.2;
            this.alpha = 1;
            this.decay = Math.random() * 0.03 + 0.015;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            this.alpha -= this.decay;
        }

        draw() {
            ctx.save();
            ctx.globalAlpha = Math.max(0, this.alpha);
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.restore();
        }
    }

    class Splatter {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.alpha = 0.5;
            
            this.baseRadius = Math.random() * 18 + 20;
            this.numPoints = Math.floor(Math.random() * 6) + 10;
            this.points = [];

            for (let i = 0; i < this.numPoints; i++) {
                const angle = (i / this.numPoints) * Math.PI * 2;
                const dist = this.baseRadius * (0.4 + Math.random() * 0.8);
                this.points.push({
                    x: Math.cos(angle) * dist,
                    y: Math.sin(angle) * dist
                });
            }

            this.droplets = [];
            const numDroplets = Math.floor(Math.random() * 5) + 3;
            for (let i = 0; i < numDroplets; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = this.baseRadius * (1.2 + Math.random() * 0.8);
                this.droplets.push({
                    x: Math.cos(angle) * dist,
                    y: Math.sin(angle) * dist,
                    r: Math.random() * 3 + 1.5
                });
            }
        }

        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;

            ctx.beginPath();
            ctx.moveTo(this.points[0].x, this.points[0].y);

            for (let i = 0; i < this.numPoints; i++) {
                const p1 = this.points[i];
                const p2 = this.points[(i + 1) % this.numPoints];
                const midX = (p1.x + p2.x) / 2;
                const midY = (p1.y + p2.y) / 2;

                ctx.quadraticCurveTo(p1.x, p1.y, midX, midY);
            }
            ctx.closePath();
            ctx.fill();

            this.droplets.forEach(d => {
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.restore();
        }
    }

    function addBladePoint(x, y) {
        const rect = canvas.getBoundingClientRect();
        const mouseX = (x - rect.left) * (canvas.width / rect.width);
        const mouseY = (y - rect.top) * (canvas.height / rect.height);

        bladeTrail.push({ x: mouseX, y: mouseY, time: Date.now() });
    }

    window.addEventListener('mousedown', (e) => {
        isMouseDown = true;
        bladeTrail = [];
        addBladePoint(e.clientX, e.clientY);
    });

    window.addEventListener('mousemove', (e) => {
        if (isMouseDown) {
            addBladePoint(e.clientX, e.clientY);
            checkSlices();
        }
    });

    window.addEventListener('mouseup', () => { isMouseDown = false; });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isMouseDown = true;
        bladeTrail = [];
        const touch = e.touches[0];
        addBladePoint(touch.clientX, touch.clientY);
    });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (isMouseDown) {
            const touch = e.touches[0];
            addBladePoint(touch.clientX, touch.clientY);
            checkSlices();
        }
    });

    canvas.addEventListener('touchend', () => { isMouseDown = false; });

    function lineIntersectsCircle(p1, p2, circle) {
        const dx = p2.x - p1.x;
        const dy = p2.y - p1.y;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len === 0) return false;

        const u = ((circle.x - p1.x) * dx + (circle.y - p1.y) * dy) / (len * len);
        const clampedU = Math.max(0, Math.min(1, u));

        const nearestX = p1.x + clampedU * dx;
        const nearestY = p1.y + clampedU * dy;

        const distX = circle.x - nearestX;
        const distY = circle.y - nearestY;

        return (distX * distX + distY * distY) < (circle.radius * circle.radius);
    }

    function checkSlices() {
        if (bladeTrail.length < 2 || !gameActive) return;

        const p1 = bladeTrail[bladeTrail.length - 2];
        const p2 = bladeTrail[bladeTrail.length - 1];

        for (let i = items.length - 1; i >= 0; i--) {
            const item = items[i];
            
            if (item.isHalf) continue;

            if (lineIntersectsCircle(p1, p2, item)) {
                if (item.isBomb) {
                    explodeBomb(item.x, item.y);
                    endGame();
                    return;
                } else {
                    sliceFruit(item, i);
                }
            }
        }
    }

    function updateComboSystem() {
        const now = Date.now();
        recentSliceTimes.push(now);
        lastSliceTimestamp = now;

        recentSliceTimes = recentSliceTimes.filter(t => now - t <= COMBO_TRIGGER_WINDOW);

        if (!isComboActive) {
            if (recentSliceTimes.length > 2) {
                isComboActive = true;
                comboCount = recentSliceTimes.length;
            }
        } else {
            comboCount++;
        }

        if (isComboActive) {
            comboBox.innerText = `COMBO x${comboCount}`;
            comboBox.classList.remove('active');
            void comboBox.offsetWidth;
            comboBox.classList.add('active');
        }
    }

    function sliceFruit(fruit, index) {
        items.splice(index, 1);
        
        updateComboSystem();

        const pointsEarned = fruit.type.score * (isComboActive ? 2 : 1);
        score += pointsEarned;
        scoreText.innerText = score;

        if (fruit.isIceBanana) {
            freezeTimer = TOTAL_FREEZE_TIME;
            gameContainer.classList.add('frozen');
            freezeIndicator.style.display = 'block';
        }

        splatters.push(new Splatter(fruit.x, fruit.y, fruit.type.innerColor));
        if (splatters.length > 10) splatters.shift();

        items.push(new HalfFruit(fruit.x, fruit.y, fruit.type, true, fruit.vx));
        items.push(new HalfFruit(fruit.x, fruit.y, fruit.type, false, fruit.vx));

        for (let i = 0; i < 14; i++) {
            particles.push(new Particle(fruit.x, fruit.y, fruit.type.innerColor));
        }
    }

    function explodeBomb(x, y) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (let i = 0; i < 40; i++) {
            particles.push(new Particle(x, y, Math.random() > 0.5 ? '#f39c12' : '#e74c3c'));
        }
    }

    function updateLivesUI() {
        let text = '';
        for (let i = 0; i < 5; i++) {
            text += (i < lives) ? '❌ ' : '⚪ ';
        }
        livesText.innerText = text.trim();
    }

    function resetCombo() {
        isComboActive = false;
        comboCount = 0;
        recentSliceTimes = [];
        comboBox.classList.remove('active');
    }

    function startGame() {
        score = 0;
        lives = 5;
        items = [];
        particles = [];
        splatters = [];
        bladeTrail = [];
        frameCount = 0;
        freezeTimer = 0;
        resetCombo();
        gameActive = true;

        gameContainer.classList.remove('frozen');
        freezeIndicator.style.display = 'none';

        scoreText.innerText = score;
        updateLivesUI();

        startOverlay.classList.add('hidden');
        gameOverOverlay.classList.add('hidden');
    }

    function endGame() {
        gameActive = false;
        finalScore.innerText = score;
        resetCombo();
        gameOverOverlay.classList.remove('hidden');
        gameContainer.classList.remove('frozen');
        freezeIndicator.style.display = 'none';
    }

    // --- FIXED VIGNETTE DRAWING FUNCTION --- //
    function drawIceVignette(ratio) {
        ctx.save();
        
        const w = canvas.width;
        const h = canvas.height;
        const maxBorder = 65 * ratio;

        const vignetteGrad = ctx.createRadialGradient(
            w / 2, h / 2, Math.min(w, h) * 0.25,
            w / 2, h / 2, Math.max(w, h) * 0.6
        );
        vignetteGrad.addColorStop(0, 'rgba(0, 210, 211, 0)');
        vignetteGrad.addColorStop(0.7, `rgba(0, 210, 211, ${0.18 * ratio})`);
        vignetteGrad.addColorStop(1, `rgba(224, 255, 255, ${0.5 * ratio})`);

        ctx.fillStyle = vignetteGrad;
        ctx.fillRect(0, 0, w, h);

        ctx.fillStyle = `rgba(220, 245, 255, ${0.8 * ratio})`;
        ctx.strokeStyle = `rgba(0, 210, 211, ${0.95 * ratio})`;
        ctx.lineWidth = 3;

        // Top Ice Edge
        ctx.beginPath();
        ctx.moveTo(0, 0);
        for (let x = 0; x <= w; x += 25) {
            const jagged = Math.sin(x * 0.05 + freezeTimer * 0.002) * 15 * ratio;
            ctx.lineTo(x, maxBorder + jagged);
        }
        ctx.lineTo(w, 0);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Bottom Ice Edge
        ctx.beginPath();
        ctx.moveTo(0, h);
        for (let x = 0; x <= w; x += 25) {
            const jagged = Math.cos(x * 0.05 + freezeTimer * 0.002) * 15 * ratio;
            ctx.lineTo(x, h - maxBorder - jagged);
        }
        ctx.lineTo(w, h);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Left Ice Edge
        ctx.beginPath();
        ctx.moveTo(0, 0);
        for (let y = 0; y <= h; y += 25) {
            const jagged = Math.sin(y * 0.05 + freezeTimer * 0.002) * 15 * ratio;
            ctx.lineTo(maxBorder + jagged, y);
        }
        ctx.lineTo(0, h);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        // Right Ice Edge (Fixed lineTo call)
        ctx.beginPath();
        ctx.moveTo(w, 0);
        for (let y = 0; y <= h; y += 25) {
            const jagged = Math.cos(y * 0.05 + freezeTimer * 0.002) * 15 * ratio;
            ctx.lineTo(w - maxBorder - jagged, y);
        }
        ctx.lineTo(w, h);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.restore();
    }

    let lastTime = performance.now();

    function gameLoop(currentTime) {
        const deltaTime = currentTime - lastTime;
        lastTime = currentTime;

        if (gameActive && isComboActive) {
            if (Date.now() - lastSliceTimestamp > COMBO_TIMEOUT) {
                resetCombo();
            }
        }

        if (freezeTimer > 0) {
            freezeTimer -= deltaTime;
            if (freezeTimer <= 0) {
                freezeTimer = 0;
                gameContainer.classList.remove('frozen');
                freezeIndicator.style.display = 'none';
            }
        }

        drawWoodTexture();
        splatters.forEach(s => s.draw());

        if (gameActive) {
            if (freezeTimer <= 0) {
                frameCount++;
                if (frameCount % spawnInterval === 0) {
                    const count = Math.floor(Math.random() * 2) + 1;
                    for (let i = 0; i < count; i++) {
                        items.push(new Item());
                    }
                }
            }

            for (let i = items.length - 1; i >= 0; i--) {
                const item = items[i];
                item.update();
                item.draw();

                if (item.y - item.radius > canvas.height + 50) {
                    if (!item.isBomb && !item.isHalf) {
                        lives--;
                        updateLivesUI();
                        if (lives <= 0) {
                            endGame();
                        }
                    }
                    items.splice(i, 1);
                }
            }
        }

        if (freezeTimer > 0) {
            const freezeRatio = Math.max(0, freezeTimer / TOTAL_FREEZE_TIME);
            drawIceVignette(freezeRatio);
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.update();
            p.draw();
            if (p.alpha <= 0) particles.splice(i, 1);
        }

        const now = Date.now();
        bladeTrail = bladeTrail.filter(p => now - p.time < 150);

        if (bladeTrail.length > 1) {
            ctx.beginPath();
            ctx.moveTo(bladeTrail[0].x, bladeTrail[0].y);
            for (let i = 1; i < bladeTrail.length; i++) {
                ctx.lineTo(bladeTrail[i].x, bladeTrail[i].y);
            }
            ctx.strokeStyle = freezeTimer > 0 ? '#00f2fe' : '#2ed573';
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowColor = freezeTimer > 0 ? '#00f2fe' : '#2ed573';
            ctx.shadowBlur = 14;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
</script>
